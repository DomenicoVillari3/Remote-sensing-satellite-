version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console Web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks:
      - bigdata-net

  createbuckets:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        sleep 2;
      done;
      # QUI LA MODIFICA IMPORTANTE: Il nome del bucket deve coincidere con il Python
      mc mb --ignore-existing myminio/sicily-sentinel-data;
      mc anonymous set public myminio/sicily-sentinel-data;
      echo 'Bucket sicily-sentinel-data ready.';
      exit 0;
      "
    networks:
      - bigdata-net

# Networks va al livello radice, non identato sotto services
networks:
  bigdata-net:
    driver: bridge